<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vapor & Snuso Catalogue</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #070707; --accent: #00eaff; --card: #141414; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 15px; padding-bottom: 120px; }
        
        .logo-wrap { text-align: center; margin-bottom: 15px; }
        .logo-wrap img { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--accent); box-shadow: 0 0 20px rgba(0,234,255,0.3); }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 20px; color: var(--accent); margin: 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        .city-badge { background: #1a1a1a; border: 1px solid var(--accent); color: var(--accent); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 13px; display: inline-block; }

        .cat-title { color: #fff; font-size: 16px; text-transform: uppercase; margin: 25px 0 15px; border-left: 4px solid var(--accent); padding-left: 10px; font-weight: 900; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: var(--card); border-radius: 15px; padding: 10px; border: 1px solid #222; display: flex; flex-direction: column; justify-content: space-between; }
        .card img { width: 100%; height: 110px; object-fit: contain; border-radius: 10px; margin-bottom: 10px; background: #000; }
        .name { font-size: 12px; font-weight: bold; margin-bottom: 8px; line-height: 1.3; }
        .price { color: var(--accent); font-size: 15px; font-weight: 900; margin-bottom: 10px; }
        .btn { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 10px; font-weight: 800; cursor: pointer; font-size: 12px; width: 100%; }

        .footer { position: fixed; bottom: 10px; left: 10px; right: 10px; background: rgba(10,10,10,0.95); backdrop-filter: blur(15px); padding: 15px 20px; border-radius: 20px; border: 1px solid var(--accent); display: none; justify-content: space-between; align-items: center; z-index: 1000; }
        .total-price { font-size: 18px; font-weight: 900; }
        .order-btn { background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 900; }
    </style>
</head>
<body>

    <div class="logo-wrap"><img src="https://ibb.co.com/1tMH3tcL" alt="Logo"></div>
    <div class="header">
        <h1>Vapor & Snuso Catalogue</h1>
        <div class="city-badge" id="city-name">Загрузка...</div>
    </div>

    <div id="catalog"></div>

    <div class="footer" id="footer">
        <div id="total" class="total-price">0 ₸</div>
        <button class="order-btn" onclick="sendOrder()">ОФОРМИТЬ</button>
    </div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    const urlParams = new URLSearchParams(window.location.search);
    const userCity = urlParams.get('city') || 'Астана';
    document.getElementById('city-name').innerText = '📍 ' + userCity.toUpperCase();

    // Функция рандомной цены для снюса
    const snusPrice = () => Math.floor(Math.random() * (5700 - 5500 + 1)) + 5500;

    const allItems = [
        // СНЮС
        { cat: 'snus', name: 'Kasta Sasuke', price: snusPrice(), img: 'https://app.snus-mafia.ru/image/cache/catalog/snus/kasta/anime/IMG_2395-500x400.png', cities: ['Астана', 'Алматы', 'Караганда'] },
        { cat: 'snus', name: 'Kasta Kakashi', price: snusPrice(), img: 'https://app.snus-mafia.ru/image/cache/catalog/snus/kasta/anime/IMG_2399-500x400.png', cities: ['Астана', 'Алматы'] },
        { cat: 'snus', name: 'Kasta Itachi', price: snusPrice(), img: 'https://a.vkidochnaya.com/public/images/055cbc5a3c96101f6205a36fe6aa3309.jpg', cities: ['Астана'] },
        { cat: 'snus', name: 'Drymost Grape', price: 5000, img: 'https://q27.shizashop.ru/product/drymost-tornado-grape-amnesia/', cities: ['Астана', 'Алматы'] },
        { cat: 'snus', name: 'Red Black Mint', price: 4500, img: 'https://a.vkidochnaya.com/public/images/0e5831f3cfe25c18af7258b47d083595.jpg', cities: ['Астана'] },
        { cat: 'snus', name: 'Corvus Joker Berries', price: 5200, img: 'https://antitobacco.ru/wp-content/uploads/2024/06/lesnye-jagody-corvus-joker-wild-berries-50-mg.png', cities: ['Астана', 'Караганда'] },
        
        // ОДНОРАЗКИ
        { cat: 'vape', name: 'Waka 10000 Арбуз Лед', price: 8500, img: 'https://static.insales-cdn.com/images/products/1/641/1773855361/Blueberry_Raspberry.jpg', cities: ['Астана', 'Алматы', 'Караганда'] },
        { cat: 'vape', name: 'Lost Mary 10000 Питая', price: 9000, img: 'https://eltobacco.ru/wp-content/uploads/2024/11/3b19f5c6-e9be-4db5-ad4a-2ea087d794f8_cfd530f7-d979-4ee3-93a1-c0a8a773759b-768x768.jpg', cities: ['Астана'] },
        { cat: 'vape', name: 'Waka 20000 Киви Гуава', price: 11000, img: 'https://static.insales-cdn.com/images/products/1/1365/933987669/WAKA_soPro_20000_Kiwi_Passion_Guava.jpg', cities: ['Астана', 'Алматы'] },
        
        // ПОДЫ
        { cat: 'pods', name: 'Vaporesso Xros 4', price: 16000, img: 'https://static.insales-cdn.com/images/products/1/1216/894796992/import_files_c3_c3dcb792355811efa2d618c04ded6b9e_a1f7b63d58ae11efa2d618c04ded6b9e.png', cities: ['Астана', 'Алматы', 'Караганда'] },
        { cat: 'pods', name: 'Xlim Pro OXVA', price: 14500, img: 'https://sofly.club/userdata/public/gfx/31382/Gleamy-Blue.jpg', cities: ['Астана'] },
        { cat: 'pods', name: 'GeekVape H45', price: 15500, img: 'http://img.dotsmoke.ru/images/products/1/2072/723781656/Aqua.jpeg', cities: ['Астана', 'Алматы'] },
        { cat: 'pods', name: 'Minican 3', price: 8500, img: 'https://cdn.prod.website-files.com/64705a97bff4c83a3358e709/65ba771dc1e34ff3e75519fa_649185ebf90579dea25aa38e_MINICAN%2525203%281%29.png', cities: ['Астана', 'Караганда'] },

        // ЖИЖИ
        { cat: 'liquid', name: 'Husky Siberian Wolf', price: 3500, img: 'https://orenburg-tp.ru/wa-data/public/shop/products/61/25/22561/images/85361/85361.970.png', cities: ['Астана', 'Алматы', 'Караганда'] },
        { cat: 'liquid', name: 'Maxwell Shoria', price: 4000, img: 'https://kzn.zenmod.shop/image/cache/catalog/Liquid/MAXWELLS/Chubby/maxwells_re_30_shoria-800x800.jpg', cities: ['Астана'] },
        { cat: 'liquid', name: 'Angry Vape Акула', price: 3800, img: 'https://kurgan.smokemarket.cc/image/cache/catalog/product/c855fdda-84a5-11ef-9b1c-309c23b36407/1c_c855fdda84a511ef9b1c309c23b36407_29516ec78cb311f08df7e8c829096b9e-1200x630.jpg', cities: ['Астана', 'Алматы'] }
    ];

    const categories = { 'snus': 'Снюс', 'vape': 'Одноразки', 'pods': 'Под-системы', 'liquid': 'Жидкости' };
    let cart = [];

    function render() {
        const container = document.getElementById('catalog');
        for (let key in categories) {
            const cityItems = allItems.filter(i => i.cat === key && i.cities.includes(userCity));
            if (cityItems.length > 0) {
                container.innerHTML += `<div class="cat-title">${categories[key]}</div>`;
                const grid = document.createElement('div');
                grid.className = 'grid';
                cityItems.forEach(item => {
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${item.img}" onerror="this.src='https://via.placeholder.com/150/141414/00eaff?text=Vapor+Shop'">
                            <div>
                                <div class="name">${item.name}</div>
                                <div class="price">${item.price} ₸</div>
                            </div>
                            <button class="btn" onclick="add('${item.name}', ${item.price})">ДОБАВИТЬ</button>
                        </div>
                    `;
                });
                container.appendChild(grid);
            }
        }
    }

    function add(name, price) {
        cart.push({name, price});
        document.getElementById('footer').style.display = 'flex';
        document.getElementById('total').innerText = `${cart.reduce((s, i) => s + i.price, 0)} ₸`;
        tg.HapticFeedback.impactOccurred('light');
    }

    function sendOrder() {
        if(cart.length > 0) {
            tg.sendData(JSON.stringify({cart, city: userCity}));
            tg.close();
        }
    }

    render();
</script>
</body>
</html>
